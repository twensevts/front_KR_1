<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карточка товара</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <div class="product-card">
            <div class="product-card__image">
                <img src="https://images.unsplash.com/photo-1741021968112-9b5cf12e34a7?q=80&w=687&auto=format&fit=crop&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxwaG90by1wYWdlfHx8fGVufDB8fHx8fA%3D%3D"
                    alt="Биоробот, имитирующий обычного кота">
            </div>
            <div class="product-card__content">
                <h2 class="product-card__title">Биоробот, имитирующий обычного кота</h2>
                <p class="product-card__description">
                    Вам кажется, что это обычный кот? Приглядитесь!
                    На самом деле котов не существует, они все биороботы.
                    Делают милый вид, чтобы их погладили, а потом...ЦАП!
                    Никто не выжил.
                </p>
                <div class="product-card__footer">
                    <span class="product-card__price">6 666 ₽</span>
                    <button class="product-card__btn">Купить</button>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
